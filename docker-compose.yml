services:
  mongo:
    image: mongo:8
    container_name: taskhub-mongo
    restart: unless-stopped

    ports:
      - "27017:27017"

    volumes:
      - mongo-data:/data/db

  backend:
    build:
      context: ./backend

    container_name: taskhub-backend

    restart: unless-stopped

    ports:
      - "3001:3001"

    environment:
      PORT: 3001
      MONGODB_URI: mongodb://mongo:27017/kybern-taskhub

    depends_on:
      - mongo

  frontend:
    build:
      context: ./frontend

    container_name: taskhub-frontend

    restart: unless-stopped

    ports:
      - "3000:3000"

    environment:
      NEXT_PUBLIC_API_URL: http://backend:3001/api

    depends_on:
      - backend

volumes:
  mongo-data: