services:
  mongodb:
    image: mongo:7
    container_name: taskhub-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - taskhub-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taskhub-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - backend/.env
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - taskhub-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/docs"]
      interval: 15s
      timeout: 10s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:3001/api
    container_name: taskhub-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - taskhub-network

networks:
  taskhub-network:
    driver: bridge

volumes:
  mongo_data:
