services:
  mongodb:
    image: mongo:7
    container_name: taskhub-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - taskhub-network
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taskhub-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - MONGODB_URI=mongodb://mongodb:27017/kybern-taskhub
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - mongodb
    networks:
      - taskhub-network
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:3001/api
    container_name: taskhub-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - taskhub-network
networks:
  taskhub-network:
    driver: bridge
volumes:
  mongo_data: