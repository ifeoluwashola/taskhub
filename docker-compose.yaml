services:
  mongodb:
    image: mongo:7
    container_name: taskhub-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME}

    volumes:
      - mongo-data:/data/db
    networks:
      - taskhub-net

  backend:
    image: temigodson/taskhub-hub-backend:v2
    container_name: taskhub-backend
    restart: unless-stopped
    environment:
      MONGODB_URI: mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongodb:27017/${MONGO_DB_NAME}?authSource=admin
      PORT: ${BACKEND_PORT:-3001}
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    depends_on:
      - mongodb
    networks:
      - taskhub-net

  frontend:
    image: temigodson/taskhub-hub-frontend:v2
    container_name: taskhub-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      PORT: ${FRONTEND_PORT:-3000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
    networks:
      - taskhub-net

networks:
  taskhub-net:
    driver: bridge

volumes:
  mongo-data:
